<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Helical Ribbon — High‑Resolution WebM Recorder</title>

<style>
html, body {
  margin:0;
  padding:0;
  background:black;
  overflow:hidden;
  font-family:system-ui;
}
canvas {
  display:block;
  pointer-events:none;
}

#controls {
  position:fixed;
  top:12px;
  left:12px;
  z-index:10;
}
#controls button {
  padding:6px 12px;
  cursor:pointer;
}

#status {
  margin-top:6px;
  font-size:13px;
  color:#ddd;
}
#rec {
  color:#ff4040;
  font-weight:bold;
  display:none;
}
</style>
</head>

<body>

<div id="controls">
  <button id="toggleRec">Start Recording (R)</button>
  <div id="status">
    <span id="rec">● RECORDING</span><br>
    Time: <span id="elapsed">0.0</span>s
  </div>
</div>

<canvas id="canvas"></canvas>

<script>
/* =====================================================
   RENDERER — BIT‑EXACT (UNCHANGED)
===================================================== */
// ============================
// Math & Camera
// ============================
class Vec3 { constructor(x=0,y=0,z=0){this.x=x;this.y=y;this.z=z;} clone(){return new Vec3(this.x,this.y,this.z);} add(v){this.x+=v.x;this.y+=v.y;this.z+=v.z;return this;} }
class Quaternion {
  constructor(w,x,y,z){this.w=w;this.x=x;this.y=y;this.z=z;}
  static fromAxisAngle(axis,a){ const s=Math.sin(a/2); return new Quaternion(Math.cos(a/2),axis.x*s,axis.y*s,axis.z*s); }
  multiply(q){ return new Quaternion(this.w*q.w-this.x*q.x-this.y*q.y-this.z*q.z, this.w*q.x+this.x*q.w+this.y*q.z-this.z*q.y, this.w*q.y-this.x*q.z+this.y*q.w+this.z*q.x, this.w*q.z+this.x*q.y-this.y*q.x+this.z*q.w); }
  conjugate(){ return new Quaternion(this.w,-this.x,-this.y,-this.z); }
  rotateVector(v){ const qv=new Quaternion(0,v.x,v.y,v.z); const qr=this.multiply(qv).multiply(this.conjugate()); return new Vec3(qr.x,qr.y,qr.z); }
}

const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
let W=canvas.width=innerWidth, H=canvas.height=innerHeight;
const focal=600;
function project(p){ const s=focal/(focal+p.z); return {x:W/2+p.x*s, y:H/2+p.y*s, s}; }
addEventListener('resize',()=>{ W=canvas.width=innerWidth; H=canvas.height=innerHeight; });

// ============================
// Helpers
// ============================
function randomAxis(){ let x=Math.random()*2-1,y=Math.random()*2-1,z=Math.random()*2-1; let l=Math.hypot(x,y,z)||1; return new Vec3(x/l,y/l,z/l); }

// ============================
// Particle / Ribbon
// ============================
class Particle {
  constructor(level=0,max=3){
    this.level=level; this.max=max; this.radius=40/(level+1);
    this.speed=0.06+Math.random()*0.04;
    this.phase=Math.random()*Math.PI*2;
    this.vz=(Math.random()<0.5?-1:1)*(2+Math.random()*4);
    this.z=0; this.pos=new Vec3(); this.hist=[];
    this.hue=Math.random()*360;
    this.twist=Quaternion.fromAxisAngle(randomAxis(),Math.random()*0.2);
    this.child=level<max?new Particle(level+1,max):null;
  }
  update(t){
    this.z+=this.vz; if(this.z>1500||this.z<-1500)this.vz*=-1;
    const a=t*this.speed+this.phase;
    const v=new Vec3(this.radius*Math.cos(a), this.radius*Math.sin(a), this.z);
    this.pos=this.twist.rotateVector(v);
    this.hist.push(this.pos.clone()); if(this.hist.length>15)this.hist.shift();
    if(this.child){ this.child.pos=this.pos.clone().add(this.child.pos); this.child.update(t); }
  }
  draw(){
    for(let i=1;i<this.hist.length;i++){
      const p1=project(this.hist[i-1]), p2=project(this.hist[i]);
      const h=(this.hue+Date.now()*0.1+i*12)%360;
      const g=ctx.createLinearGradient(p1.x,p1.y,p2.x,p2.y);
      g.addColorStop(0,`hsla(${h},100%,50%,0)`);
      g.addColorStop(0.5,`hsla(${h},100%,50%,0.4)`);
      g.addColorStop(1,`hsla(${h},100%,50%,0.9)`);
      ctx.strokeStyle=g; ctx.lineWidth=(this.max-this.level+1)*2*p2.s;
      ctx.lineCap='round'; ctx.lineJoin='round';
      ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
    }
    if(this.child) this.child.draw();
  }
}

// ============================
// French Curve
// ============================
const uiTwist = Quaternion.fromAxisAngle(new Vec3(0.25,0.9,0.15),0.03);
function smoothStep(u){ return u*u*(3-2*u); }
function drawFrenchCurve(t){
  const pts=[]; const N=26; const baseZ=-320;
  for(let i=0;i<=N;i++){
    const u=i/N;
    const env = 0.25 + 1.2*Math.exp(-Math.pow((u-0.4)*3,2)) - 0.6*Math.exp(-Math.pow((u-0.75)*5,2));
    const y = Math.sign(u-0.5)*env*52*smoothStep(Math.min(1,Math.abs(u-0.5)*2));
    const v=new Vec3(-170+u*340,y,baseZ+env*36*Math.sin(Date.now()*0.0007+u*1.6));
    pts.push(project(uiTwist.rotateVector(v)));
  }
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[i-1]||pts[i], p1=pts[i], p2=pts[i+1], p3=pts[i+2]||p2;
    ctx.bezierCurveTo(
      p1.x+(p2.x-p0.x)*0.35,
      p1.y+(p2.y-p0.y)*0.35,
      p2.x-(p3.x-p1.x)*0.18,
      p2.y-(p3.y-p1.y)*0.18,
      p2.x,p2.y
    );
  }
  ctx.strokeStyle='rgba(145,70,255,0.22)';
  ctx.lineWidth=16;
  ctx.lineCap='round';
  ctx.lineJoin='round';
  ctx.shadowColor='rgba(145,70,255,0.25)';
  ctx.shadowBlur=30;
  ctx.stroke();
  ctx.shadowBlur=0;
}

// =====================================================
// HIGH‑RES WEBM RECORDING (NON‑RENDERING)
// =====================================================
let recorder, chunks=[], recording=false;
let startTime=0;

const btn=document.getElementById("toggleRec");
const rec=document.getElementById("rec");
const elapsedEl=document.getElementById("elapsed");

function startRecording(){
  chunks.length=0;

  const stream = canvas.captureStream(60);

  recorder = new MediaRecorder(stream, {
    mimeType: "video/webm; codecs=vp9",
    videoBitsPerSecond: 80_000_000 // 80 Mbps
  });

  recorder.ondataavailable = e => e.data.size && chunks.push(e.data);
  recorder.onstop = () => {
    const blob = new Blob(chunks, { type:"video/webm" });
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="helical_highres.webm";
    a.click();
  };

  recorder.start();
  recording=true;
  startTime=performance.now();
  rec.style.display="inline";
  btn.textContent="Stop Recording (R)";
}

function stopRecording(){
  recorder.stop();
  recording=false;
  rec.style.display="none";
  btn.textContent="Start Recording (R)";
}

btn.onclick=()=>recording?stopRecording():startRecording();
addEventListener("keydown",e=>{
  if(e.key.toLowerCase()==="r"){
    recording?stopRecording():startRecording();
  }
});

// =====================================================
// MAIN LOOP — RENDERER UNTOUCHED
// =====================================================
const particles=[]; for(let i=0;i<30;i++) particles.push(new Particle());

function loop(){
  const t=Date.now();
  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.fillRect(0,0,W,H);

  drawFrenchCurve(t);
  particles.forEach(p=>{ p.update(t); p.draw(); });

  if(recording){
    elapsedEl.textContent =
      ((performance.now() - startTime) / 1000).toFixed(1);
  }

  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
